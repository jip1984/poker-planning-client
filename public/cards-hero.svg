<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 250">
  <defs>
    <filter id="cardShadow" x="-25%" y="-25%" width="150%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.2" />
    </filter>
    <style>
      .card { fill: #fff; stroke: #c9c9c9; stroke-width: 2.2; }
      .frame { fill: none; stroke: currentColor; stroke-width: 2; }
      .black { color: #3b3b3b; fill: #3b3b3b; }
      .red { color: #ef4444; fill: #ef4444; }
      .index { font: 700 28px Georgia, 'Times New Roman', serif; }
      .corner { font: 700 22px Georgia, 'Times New Roman', serif; }
    </style>
  </defs>

  <g filter="url(#cardShadow)">
    <g class="black" transform="translate(54 40) rotate(-24 58 84)">
      <rect class="card" x="0" y="0" width="116" height="168" rx="18" />
      <text class="index" x="18" y="38">A</text>
      <text x="26" y="74" font-size="34">♣</text>
      <rect class="frame" x="28" y="52" width="60" height="84" />
    </g>

    <g class="red" transform="translate(126 24) rotate(-10 58 84)">
      <rect class="card" x="0" y="0" width="116" height="168" rx="18" />
      <text class="index" x="18" y="38">A</text>
      <text x="24" y="76" font-size="36">♥</text>
      <rect class="frame" x="28" y="52" width="60" height="84" />
    </g>

    <g class="black" transform="translate(170 34)">
      <rect class="card" x="0" y="0" width="136" height="182" rx="20" />
      <text class="index" x="18" y="38">A</text>
      <text x="20" y="74" font-size="34">♠</text>
      <rect class="frame" x="28" y="44" width="84" height="112" />
      <text x="70" y="112" text-anchor="middle" font-size="62">♠</text>
      <text class="corner" x="118" y="162" transform="rotate(180 118 162)">A</text>
      <text x="118" y="138" text-anchor="middle" font-size="30" transform="rotate(180 118 138)">♠</text>
    </g>
  </g>
</svg>
